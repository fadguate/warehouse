name: Respaldo quincenal de la base de datos

on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

jobs:
  respaldo:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de PostgreSQL 17
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          
      - name: Generar respaldo de la base de datos
        run: /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-acl -f respaldo-kardex.sql
        
      - name: Guardar respaldo como archivo descargable
        uses: actions/upload-artifact@v4
        with:
          name: respaldo-kardex-${{ github.run_id }}
          path: respaldo-kardex.sql
          retention-days: 90
