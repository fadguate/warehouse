name: Mantener activa la base de datos de Supabase

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar Supabase para evitar pausa por inactividad
        run: |
          curl -s -o /dev/null -w "Código de respuesta: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bodegas?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}"
